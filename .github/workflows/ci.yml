name: CI

on:
  push:
    branches:
      - main
      - develop
      - dev
  pull_request:
    branches:
      - main
      - develop
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore solution
        run: dotnet restore Slottet.sln

      - name: Build solution
        run: dotnet build Slottet.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Slottet.sln --configuration Release --no-build --verbosity normal