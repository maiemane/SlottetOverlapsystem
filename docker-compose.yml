services:
  api:
    build:
      context: .
      dockerfile: src/Slottet.Api/Dockerfile
    container_name: slottet-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__SlottetDb: "${SLOTTET_DB_CONNECTION:?SLOTTET_DB_CONNECTION is required}"
      Jwt__Issuer: "${SLOTTET_JWT_ISSUER:-Slottet.Api}"
      Jwt__Audience: "${SLOTTET_JWT_AUDIENCE:-Slottet.Web}"
      Jwt__SigningKey: "${SLOTTET_JWT_SIGNING_KEY:?SLOTTET_JWT_SIGNING_KEY is required}"
      Jwt__ExpirationMinutes: "${SLOTTET_JWT_EXPIRATION_MINUTES:-60}"
      Swagger__Enabled: "${SLOTTET_SWAGGER_ENABLED:-true}"
      Cors__AllowedOrigins__0: "${SLOTTET_WEB_ORIGIN_HTTP:-http://localhost:8080}"
      Cors__AllowedOrigins__1: "${SLOTTET_WEB_ORIGIN_HTTPS:-https://localhost:8443}"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: src/Slottet.Web/Dockerfile
    container_name: slottet-web
    depends_on:
      api:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
      Api__BaseUrl: "${SLOTTET_API_BASEURL:-http://api:8080/}"
      ConnectionStrings__SlottetDb: "${SLOTTET_DB_CONNECTION:?SLOTTET_DB_CONNECTION is required}"
      DataProtection__ApplicationName: "${SLOTTET_DATAPROTECTION_APPNAME:-Slottet}"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
